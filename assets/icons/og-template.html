<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  @font-face { font-family: 'fallback-serif'; src: local('Georgia'); }
  html, body { margin: 0; padding: 0; }
  body {
    width: 1200px;
    height: 630px;
    background: #0B2447;
    background-image:
      radial-gradient(900px 500px at 110% -10%, rgba(200,164,92,0.32), transparent 60%),
      radial-gradient(700px 400px at -10% 110%, rgba(255,255,255,0.06), transparent 60%),
      linear-gradient(135deg, #0B2447 0%, #071a36 100%);
    color: #fff;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    position: relative;
    overflow: hidden;
  }
  .frame {
    position: absolute;
    inset: 36px;
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 14px;
  }
  .accent {
    position: absolute;
    top: 36px;
    left: 36px;
    width: 6px;
    height: 78px;
    background: #C8A45C;
    border-radius: 3px;
  }
  .content {
    position: absolute;
    inset: 76px 80px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .eyebrow {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 4.5px;
    text-transform: uppercase;
    color: #C8A45C;
    margin-bottom: 16px;
  }
  h1 {
    font-family: Georgia, 'Source Serif 4', serif;
    font-size: 90px;
    line-height: 1.02;
    letter-spacing: -1.5px;
    color: #fff;
    margin: 0 0 22px;
    font-weight: 700;
  }
  h1 .cred { color: #C8A45C; font-weight: 600; font-size: 80px; }
  .role {
    font-size: 32px;
    color: #d8e0f0;
    margin: 0 0 26px;
    font-weight: 500;
    line-height: 1.25;
  }
  .badges {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin: 0;
    padding: 0;
    list-style: none;
  }
  .badges li {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.22);
    border-radius: 999px;
    padding: 9px 18px;
    font-size: 18px;
    font-weight: 600;
    color: #fff;
    letter-spacing: 0.4px;
  }
  .footer-bar {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-top: 28px;
  }
  .footer-left {
    font-size: 19px;
    color: #b8c4dc;
    letter-spacing: 0.4px;
  }
  .footer-left strong { color: #fff; font-weight: 600; }
  .url {
    font-size: 17px;
    color: #C8A45C;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>
  <div class="frame"></div>
  <div class="accent"></div>
  <div class="content">
    <div>
      <div class="eyebrow">Available now &nbsp;&middot;&nbsp; immediate start</div>
      <h1>Rama H. S. Rao<span class="cred">, CEng</span></h1>
      <p class="role">Senior Project &amp; Highway Engineer &mdash; 25+ years across TfL, the TLRN and nine London boroughs.</p>
      <ul class="badges">
        <li>FCIHT</li>
        <li>FIHE</li>
        <li>CDM 2015 PD</li>
        <li>RSA 1&ndash;2</li>
        <li>NEC3</li>
      </ul>
    </div>
    <div class="footer-bar">
      <div class="footer-left">London, UK &nbsp;&middot;&nbsp; <strong>Open to new opportunities</strong></div>
      <div class="url">rajathn8.github.io/rama.github.io</div>
    </div>
  </div>
</body>
</html>
